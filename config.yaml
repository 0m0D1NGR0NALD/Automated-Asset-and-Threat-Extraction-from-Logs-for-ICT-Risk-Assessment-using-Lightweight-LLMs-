model:
  backend: "distilroberta"   # or "gpt4o_mini"
  confidence_threshold: 0.75

asset_criticality:
  public_web_server: 5
  internal_database: 4
  developer_workstation: 3
  test_environment: 2
  unknown: 3

likelihood_matrix:
  default: 3
  sql_injection: 4
  xss: 3
  dos: 2
  brute_force: 3
  privilege_escalation: 4
  malicious_file: 3
  info_leak: 2

risk_levels:
  - name: Low
    min: 1
    max: 5
  - name: Medium
    min: 6
    max: 12
  - name: High
    min: 13
    max: 20
  - name: Critical
    min: 21
    max: 25

input:
  supported_formats: [".log", ".txt", ".json", ".csv"]